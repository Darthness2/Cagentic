<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: #161118; --surface: #221b2a; --surface-2: #2b2335;
    --border: rgba(236,231,240,.08); --border-2: rgba(236,231,240,.14);
    --text: #ece7f0; --text-2: #b0a6ba; --text-3: #7d7388;
    --accent: #f0a87a; --orchid: #c79ccf; --gold: #e6c073;
    --ok: #8ecf95; --err: #e5928f;
  }
  * { box-sizing: border-box; }
  body {
    width: 320px; margin: 0; background: var(--bg); color: var(--text);
    font: 13px/1.55 -apple-system, "Inter", "Segoe UI", system-ui, sans-serif;
  }
  header { padding: 16px 16px 12px; }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 650; }
  .brand .spark {
    width: 22px; height: 22px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 12px; color: #1b1119;
    background: linear-gradient(135deg, var(--accent), var(--orchid));
  }
  .sub { color: var(--text-3); font-size: 11px; margin: 3px 0 0 30px;
         letter-spacing: .04em; }

  .status-card {
    margin: 0 16px; padding: 12px 14px; border-radius: 11px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--text-3);
         flex-shrink: 0; }
  .dot.on { background: var(--ok); box-shadow: 0 0 0 4px rgba(142,207,149,.15); }
  .dot.off { background: var(--err); }
  .status-text { font-weight: 600; }
  .status-sub { color: var(--text-3); font-size: 11px; margin-left: auto; }

  .details { padding: 12px 16px 4px; }
  .details.hidden { display: none; }
  .kv {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .kv .k { color: var(--text-3); font-size: 11px; letter-spacing: .05em;
           text-transform: uppercase; }
  .kv .v { font-weight: 600; max-width: 200px; overflow: hidden;
           text-overflow: ellipsis; white-space: nowrap; }
  .v.model { color: var(--accent); }
  .activity { display: flex; align-items: center; gap: 7px; }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--gold);
           animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }

  .recent-label { color: var(--text-3); font-size: 11px; letter-spacing: .05em;
                  text-transform: uppercase; margin: 14px 0 7px; }
  .recent { display: flex; flex-direction: column; gap: 5px; }
  .recent .empty { color: var(--text-3); font-size: 12px; font-style: italic;
                   padding: 4px 0; }
  .act {
    display: flex; align-items: center; gap: 8px; font-size: 12px;
    padding: 7px 9px; background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .act .mk { flex-shrink: 0; }
  .act.ok .mk { color: var(--ok); }
  .act.bad .mk { color: var(--err); }
  .act .name { color: var(--orchid); font-weight: 600; }
  .act .sum { color: var(--text-3); overflow: hidden; text-overflow: ellipsis;
              white-space: nowrap; }
  .act .when { margin-left: auto; color: var(--text-3); font-size: 10.5px;
               flex-shrink: 0; }

  footer { padding: 12px 16px 16px; margin-top: 6px; border-top: 1px solid var(--border); }
  footer label { font-size: 10.5px; color: var(--text-3); letter-spacing: .05em;
                 text-transform: uppercase; }
  .port-row { display: flex; gap: 6px; margin-top: 6px; }
  input {
    flex: 1; padding: 7px 9px; border-radius: 7px; background: var(--bg);
    border: 1px solid var(--border-2); color: var(--text); font: inherit;
  }
  input:focus { outline: 0; border-color: var(--accent); }
  button {
    padding: 7px 13px; border: 0; border-radius: 7px; cursor: pointer;
    background: var(--accent); color: #1b1119; font: 600 12px inherit;
  }
  button:hover { filter: brightness(1.08); }
  .ver { margin-top: 9px; color: var(--text-3); font-size: 10.5px; }
</style>
</head>
<body>
  <header>
    <div class="brand"><span class="spark">&#10022;</span> Cagentic</div>
    <div class="sub">browser bridge</div>
  </header>

  <div class="status-card">
    <span class="dot" id="dot"></span>
    <span class="status-text" id="statusText">connecting…</span>
    <span class="status-sub" id="statusSub"></span>
  </div>

  <div class="details hidden" id="details">
    <div class="kv">
      <span class="k">AI model</span>
      <span class="v model" id="vModel">&mdash;</span>
    </div>
    <div class="kv">
      <span class="k">Doing</span>
      <span class="v"><span class="activity" id="vActivity">&mdash;</span></span>
    </div>
    <div class="recent-label">Recent browser actions</div>
    <div class="recent" id="recent"></div>
  </div>

  <footer>
    <label>Bridge token</label>
    <div class="port-row">
      <input id="token" type="password" placeholder="paste token from Cagentic"
             autocomplete="off" spellcheck="false" />
    </div>
    <label style="margin-top:8px; display:block;">Bridge port</label>
    <div class="port-row">
      <input id="port" type="number" value="8765" />
      <button id="save">Save</button>
    </div>
    <div class="ver" id="ver"></div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
