<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 14px 16px;
        font: 13px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
        background: #1c1622;
        color: #e8def0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
        color: #ffd0a8;
      }
      .tag {
        color: #a98fb8;
        font-size: 11px;
        margin-bottom: 12px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: #271d31;
        margin-bottom: 12px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #8a7a96;
      }
      .dot.on {
        background: #7ad17a;
      }
      .dot.off {
        background: #d98a8a;
      }
      label {
        font-size: 11px;
        color: #a98fb8;
        display: block;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #3a2e47;
        background: #14101a;
        color: #e8def0;
        font: inherit;
      }
      button {
        margin-top: 8px;
        width: 100%;
        padding: 7px;
        border: 0;
        border-radius: 6px;
        background: #c98f5f;
        color: #1c1622;
        font: 600 12px inherit;
        cursor: pointer;
      }
      button:hover {
        background: #dda06d;
      }
    </style>
  </head>
  <body>
    <h1>✦ Cagentic Bridge</h1>
    <div class="tag">lets your local assistant act in this browser</div>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">checking…</span>
    </div>
    <label for="port">Bridge port</label>
    <input id="port" type="number" value="8765" />
    <button id="save">Save &amp; reconnect</button>
    <script src="popup.js"></script>
  </body>
</html>
